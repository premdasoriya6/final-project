<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log-In</title>
     <link 
      rel="icon" href="Assests/favicon.ico">
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <section class="login">
      <!-- ===============Login box============================== -->
      <div class="login-box">
        <img src="Assests\logo-removebg.png" />
        <h1>TrueBrick</h1>
        <form action="home.html">
          <!-- ================Login form=========================== -->
          <input
            type="email"
            id="email"
            placeholder="Enter Your Email Address"
            required
          />
          <input
            type="password"
            id="password"
            placeholder="Enter Your Password"
            required
          />

          <!-- =================Forgot Option -->
          <div class="forgot">
            <a href="forgot.html"> Forgot Password??..</a>
          </div>

          <button type="submit">Log-In</button>
        </form>

        <!-- ======================Sign_up option=============================== -->

        <div class="sing_up">
          <a href="sign_up.html">Don`t Have An Account??...Sign-Up Now</a>
        </div>
      </div>
    </section>
  </body>
</html>
